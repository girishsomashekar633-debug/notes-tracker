<!DOCTYPE html>
<html>
<head>
    <title>Student Notes Tracker</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        textarea {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            resize: none;
            font-size: 14px;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #2575fc;
            box-shadow: 0 0 5px rgba(37,117,252,0.5);
            outline: none;
        }

        button {
            margin: 10px 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        #output {
            margin-top: 15px;
            text-align: left;
            white-space: pre-wrap;
            background: #f7f7f7;
            padding: 10px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 13px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📘 Student Notes Tracker</h2>

    <textarea id="notes" rows="8" placeholder="Write your notes here..."></textarea>

    <br>

    <button onclick="saveVersion()">💾 Save</button>
    <button onclick="showHistory()">📜 History</button>

    <p id="output"></p>
</div>

<script>
    let history = [];

    function saveVersion() {
        let content = document.getElementById("notes").value;
        if(content.trim() === "") {
            document.getElementById("output").innerText = "⚠️ Cannot save empty note!";
            return;
        }
        history.push(content);
        document.getElementById("output").innerText = "✅ Version saved!";
        document.getElementById("notes").value = "";
    }

    function showHistory() {
        if(history.length === 0) {
            document.getElementById("output").innerText = "No history yet!";
            return;
        }

        document.getElementById("output").innerText =
            history.map((v, i) => "Version " + (i+1) + ":\n" + v).join("\n\n");
    }
</script>

</body>
</html>
